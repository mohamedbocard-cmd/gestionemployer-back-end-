services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_diagana
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
      # Pour exécuter des scripts au démarrage (.js ou .sh)
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro

volumes:
  mongo_data:
